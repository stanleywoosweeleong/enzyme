/* ============= SHARE ALL RELIEF CARDS AS ONE IMAGE (Canvas 2D — iOS-safe) ============= */
const IMG_FONT="'PingFang SC','Noto Sans SC','Hiragino Sans GB','Microsoft YaHei','WenQuanYi Zen Hei',sans-serif";

/* strip emoji so text metrics stay simple */
function noEmojiStr(s){return String(s).replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}\u{1F1E6}-\u{1F1FF}\u{20E3}\u{2190}-\u{21FF}\u{2300}-\u{23FF}]/gu,'').replace(/\s{2,}/g,' ').trim();}

/* wrap to pixel width: CJK per-char, Latin per-word */
function wrapText(ctx, text, maxW){
  const lines=[];
  String(text).split('\n').forEach(para=>{
    if(para===''){ lines.push(''); return; }
    let line='';
    const tokens=para.match(/[A-Za-z0-9%·.,:;!?()\-\/'"']+|\s+|[^\s]/g)||[];
    for(const tk of tokens){
      const test=line+tk;
      if(ctx.measureText(test).width>maxW && line!==''){
        lines.push(line.replace(/\s+$/,''));
        line = tk.match(/^\s+$/)? '' : tk;
      }else line=test;
    }
    if(line!=='') lines.push(line.replace(/\s+$/,''));
  });
  return lines;
}
/* rounded-rect helper (Safari lacks roundRect on older versions) */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* Renders all relief cards to a canvas, returns a PNG blob. Pure 2D — works on iOS. */
async function renderAllReliefImage(){
  const scale=(window.devicePixelRatio&&window.devicePixelRatio>1)?2:1;
  const W=640, MX=28, cardPad=24, gap=18, innerW=W-MX*2-cardPad*2;

  // measuring pass to get total height
  const mcv=document.createElement('canvas');
  const mc=mcv.getContext('2d');
  const layout=[]; // {kind, ...}
  let y=0;

  y+=30;
  // page title
  mc.font="800 30px "+IMG_FONT;
  const titleLines=wrapText(mc, noEmojiStr(UI.reliefModalTitle[lang]), W-MX*2-58);
  layout.push({kind:'sos', x:MX, y:y});
  layout.push({kind:'pageTitle', lines:titleLines, x:MX+56, y:y});
  y+=Math.max(44, titleLines.length*40)+6;
  // intro
  const intro={zh:"水灾、地震等救灾现场的重点用途。全部为环保、无毒、可就地取材的方法。",
    zhT:"水災、地震等救災現場的重點用途。全部為環保、無毒、可就地取材的方法。",
    en:"Key uses for flood, quake and relief sites. All eco-friendly, non-toxic, field-ready methods.",
    ms:"Kegunaan utama untuk banjir, gempa dan tapak bantuan. Semua kaedah mesra alam, tanpa toksik, sedia di lapangan."}[lang];
  mc.font="400 17px "+IMG_FONT;
  const introLines=wrapText(mc, intro, W-MX*2);
  layout.push({kind:'intro', lines:introLines, x:MX, y:y});
  y+=introLines.length*24+20;

  RELIEF_IDS.forEach((id,idx)=>{
    const it=findItem(id); if(!it) return;
    const cardTop=y;
    let cy=y+cardPad;
    mc.font="800 23px "+IMG_FONT;
    const tLines=wrapText(mc, noEmojiStr(name(it)), innerW-44);
    const titleH=Math.max(34, tLines.length*31);
    mc.font="800 20px "+IMG_FONT;
    const rtxt=ratio(it); const rW=mc.measureText(rtxt).width+30;
    mc.font="400 19px "+IMG_FONT;
    const useLines=wrapText(mc, F(it,'use'), innerW);
    const noteTxt=F(it,'note'); let noteLines=null;
    if(noteTxt){ mc.font="600 17px "+IMG_FONT; noteLines=wrapText(mc, UI.labelNote[lang]+'：'+noteTxt, innerW-24); }

    let ch=cardPad + titleH + 12 + 40 + 14 + useLines.length*28;
    if(noteLines) ch+= 10 + noteLines.length*26 + 20;
    ch+=cardPad-4;

    const card={kind:'card', x:MX, y:cardTop, w:W-MX*2, h:ch, n:idx+1,
      tLines, ty:cy, rtxt, rW, useLines, noteLines};
    layout.push(card);
    y=cardTop+ch+gap;
  });

  // footer
  mc.font="400 15px "+IMG_FONT;
  const recLines=wrapText(mc, noEmojiStr(UI.footRecipe[lang]), W-MX*2);
  layout.push({kind:'foot', lines:recLines, x:MX, y:y+4});
  y+=recLines.length*23+8;
  layout.push({kind:'brand', text:noEmojiStr(UI.brand[lang]), x:MX, y:y+4});
  y+=28;
  const H=y+18;

  // draw pass
  const cv=document.createElement('canvas');
  cv.width=Math.round(W*scale); cv.height=Math.round(H*scale);
  const ctx=cv.getContext('2d');
  ctx.setTransform(scale,0,0,scale,0,0);
  ctx.textBaseline='alphabetic';
  // bg
  ctx.fillStyle='#f7efe0'; ctx.fillRect(0,0,W,H);

  for(const b of layout){
    if(b.kind==='sos'){
      ctx.fillStyle='#d43f2a'; roundRect(ctx,b.x,b.y,44,44,11); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font="800 17px "+IMG_FONT; ctx.textAlign='center';
      ctx.fillText('SOS', b.x+22, b.y+29); ctx.textAlign='left';
    }else if(b.kind==='pageTitle'){
      ctx.fillStyle='#3a2410'; ctx.font="800 30px "+IMG_FONT;
      b.lines.forEach((ln,i)=>ctx.fillText(ln, b.x, b.y+30+i*40));
    }else if(b.kind==='intro'){
      ctx.fillStyle='#6b543f'; ctx.font="400 17px "+IMG_FONT;
      b.lines.forEach((ln,i)=>ctx.fillText(ln, b.x, b.y+16+i*24));
    }else if(b.kind==='card'){
      // card bg + border
      ctx.fillStyle='#fdf9f0'; roundRect(ctx,b.x,b.y,b.w,b.h,18); ctx.fill();
      ctx.strokeStyle='#e3d3b6'; ctx.lineWidth=1.5; roundRect(ctx,b.x,b.y,b.w,b.h,18); ctx.stroke();
      let cy=b.y+cardPad;
      // number badge
      ctx.fillStyle='#a8432a'; roundRect(ctx,b.x+cardPad,cy,34,34,9); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font="800 18px "+IMG_FONT; ctx.textAlign='center';
      ctx.fillText(String(b.n), b.x+cardPad+17, cy+24); ctx.textAlign='left';
      // title
      ctx.fillStyle='#2c1e12'; ctx.font="800 23px "+IMG_FONT;
      const titleH=Math.max(34, b.tLines.length*31);
      b.tLines.forEach((ln,i)=>ctx.fillText(ln, b.x+cardPad+44, cy+24+i*31));
      cy+=titleH+12;
      // ratio pill
      ctx.fillStyle='#3a2410'; roundRect(ctx,b.x+cardPad,cy,b.rW,40,11); ctx.fill();
      ctx.fillStyle='#f0c14b'; ctx.font="800 20px "+IMG_FONT;
      ctx.fillText(b.rtxt, b.x+cardPad+15, cy+27);
      cy+=40+14;
      // use text
      ctx.fillStyle='#2c1e12'; ctx.font="400 19px "+IMG_FONT;
      b.useLines.forEach((ln,i)=>ctx.fillText(ln, b.x+cardPad, cy+16+i*28));
      cy+=b.useLines.length*28;
      // note
      if(b.noteLines){
        cy+=10;
        const nh=b.noteLines.length*26+16;
        ctx.fillStyle='#f7ece9'; roundRect(ctx,b.x+cardPad,cy,innerW,nh,11); ctx.fill();
        ctx.fillStyle='#a8432a'; ctx.font="600 17px "+IMG_FONT;
        b.noteLines.forEach((ln,i)=>ctx.fillText(ln, b.x+cardPad+12, cy+25+i*26));
      }
    }else if(b.kind==='foot'){
      // divider
      ctx.strokeStyle='#e3d3b6'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(b.x,b.y-6); ctx.lineTo(W-MX,b.y-6); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle='#6b543f'; ctx.font="400 15px "+IMG_FONT;
      b.lines.forEach((ln,i)=>ctx.fillText(ln, b.x, b.y+16+i*23));
    }else if(b.kind==='brand'){
      ctx.fillStyle='#8a7355'; ctx.font="700 14px "+IMG_FONT;
      ctx.fillText(b.text, b.x, b.y+14);
    }
  }

  return new Promise((resolve,reject)=>{
    if(cv.toBlob){
      cv.toBlob(bl=> bl?resolve(bl):reject(new Error('toBlob null')),'image/png');
    }else{
      try{ fetch(cv.toDataURL('image/png')).then(r=>r.blob()).then(resolve).catch(reject); }
      catch(e){ reject(e); }
    }
  });
}

async function shareAllReliefImage(btn){
  const orig=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML=`<span>${UI.imgMaking[lang]}</span>`;
  let blob;
  try{
    blob=await renderAllReliefImage();
  }catch(e){
    showToast(UI.imgFail[lang]+' ('+((e&&e.message)||e)+')');
    btn.disabled=false; btn.innerHTML=orig; return;
  }
  const file=new File([blob], 'eco-enzyme-relief.png', {type:'image/png'});
  const txt=UI.reliefModalTitle[lang];
  const canFiles = navigator.canShare && navigator.canShare({files:[file]});

  // ---- Branch 1 (mobile / iOS / Android): native share sheet with the image file ----
  // iOS shows its sheet where the user picks WhatsApp / LINE / Telegram / Save to Photos.
  if(navigator.share && (canFiles || navigator.canShare===undefined)){
    try{
      await navigator.share({files:[file], text:txt});
      btn.disabled=false; btn.innerHTML=orig; return;      // done
    }catch(e){
      if(e && e.name==='AbortError'){ btn.disabled=false; btn.innerHTML=orig; return; } // user cancelled
      // else fall through to Branch 2 / preview
    }
  }

  // ---- Branch 2 (desktop): download the image, then open the chosen messaging web app ----
  // The user attaches the just-downloaded PNG in the messaging app (drag-drop / paste).
  // Which app: use the remembered channel preference (wa / tg / li).
  let ch='wa';
  try{ const s=localStorage.getItem('enzymeShareCh'); if(s&&['wa','tg','li'].includes(s)) ch=s; }catch(e){}
  try{
    // download PNG
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download=file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    showToast(UI.imgDownloaded[lang]);
    // open the messaging web app so the user can attach the downloaded image
    const webUrl = ch==='tg' ? 'https://web.telegram.org/'
                 : ch==='li' ? 'https://line.me/'
                 : 'https://web.whatsapp.com/';
    setTimeout(()=>{ window.open(webUrl,'_blank','noopener'); }, 700);
  }catch(e){
    // if even download fails, show the on-screen preview to long-press/save
    showImagePreview(blob);
  }
  btn.disabled=false; btn.innerHTML=orig;
}

/* image viewer fallback: shows the PNG so user can long-press → "Save Image"/"Share" (iOS) */
function showImagePreview(blob){
  const url=URL.createObjectURL(blob);
  let ov=document.getElementById('imgPreview');
  if(!ov){
    ov=document.createElement('div');
    ov.id='imgPreview'; ov.className='img-preview';
    ov.innerHTML=`<div class="img-preview-inner">
        <div class="img-preview-tip" id="imgPreviewTip"></div>
        <img alt="">
        <button class="img-preview-close" id="imgPreviewClose">✕</button>
      </div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click',(e)=>{ if(e.target===ov) closeImagePreview(); });
    ov.querySelector('#imgPreviewClose').onclick=closeImagePreview;
  }
  ov.querySelector('#imgPreviewTip').textContent=UI.imgTip[lang];
  const imgEl=ov.querySelector('img');
  imgEl.src=url; imgEl.dataset.url=url;
  ov.classList.add('show');
  document.body.style.overflow='hidden';
}
function closeImagePreview(){
  const ov=document.getElementById('imgPreview');
  if(!ov) return;
  ov.classList.remove('show');
  const imgEl=ov.querySelector('img');
  if(imgEl.dataset.url){ URL.revokeObjectURL(imgEl.dataset.url); imgEl.dataset.url=''; }
  if(!document.querySelector('.modal-bg.show')) document.body.style.overflow='';
}
/* ================= Projector mode (fullscreen, for talks) ================= */
let projIndex=0, projItems=[];
const projOverlay=document.getElementById('projOverlay');
const projStage=document.getElementById('projStage');
let projCat='all';   // currently presented section ('all' or a category key)

function projEntriesByCat(){
  const byCat={};
  allEntries().forEach(it=>{(byCat[it.cat]=byCat[it.cat]||[]).push(it);});
  return byCat;
}
function projBuildItems(cat){
  // build the slide list for the chosen section (cat='all' => everything, 'custom' => user's own)
  projItems=[];
  if(cat==='custom'){
    CUSTOM.forEach(it=>projItems.push(it));
    return;
  }
  const order=Object.keys(CATS);
  const byCat=projEntriesByCat();
  order.forEach(c=>{
    if(cat!=='all' && c!==cat) return;
    (byCat[c]||[]).forEach(it=>projItems.push(it));
  });
}
function buildProjMenu(){
  const byCat=projEntriesByCat();
  const total=allEntries().length;
  document.getElementById('projMenuTitle').textContent = UI.projPick[lang];
  let html='';
  // "All uses" tile first
  html+=`<button class="proj-menu-tile pm-all" data-pcat="all">
    <span class="pm-ico">📖</span>
    <span class="pm-name">${UI.projAll[lang]}</span>
    <span class="pm-count">${UI.count[lang](total)}</span>
  </button>`;
  // presenter's own custom entries — a dedicated section (only if they have any)
  if(CUSTOM.length>0){
    html+=`<button class="proj-menu-tile pm-custom" data-pcat="custom">
      <span class="pm-ico">⭐</span>
      <span class="pm-name">${UI.customFilter[lang]}</span>
      <span class="pm-count">${UI.count[lang](CUSTOM.length)}</span>
    </button>`;
  }
  Object.keys(CATS).forEach(c=>{
    const cnt=(byCat[c]||[]).length;
    if(!cnt) return;
    const cat=CATS[c];
    html+=`<button class="proj-menu-tile" data-pcat="${c}">
      <span class="pm-ico">${cat.ico}</span>
      <span class="pm-name">${cat[lang]}</span>
      <span class="pm-count">${UI.count[lang](cnt)}</span>
    </button>`;
  });
  const grid=document.getElementById('projMenuGrid');
  grid.innerHTML=html;
  grid.querySelectorAll('.proj-menu-tile').forEach(t=>{
    t.onclick=()=>startProjSection(t.dataset.pcat);
  });
}
function showProjMenu(){
  buildProjMenu();
  projOverlay.classList.add('menu-open');
}
function startProjSection(cat){
  projCat=cat;
  projBuildItems(cat);
  if(!projItems.length){ showProjMenu(); return; }
  projIndex=0;
  projOverlay.classList.remove('menu-open');
  projRender();
}
function projRender(){
  const it=projItems[projIndex];
  if(!it){ projStage.innerHTML=''; return; }
  const cat=CATS[it.cat];
  const catName = cat ? cat[lang] : '';
  const isCustom = !!it.cid;
  const nm=name(it);
  const sub = lang==='en'? it.zh : it.en;
  const r=ratio(it);
  const useTxt=F(it,'use');
  const noteTxt=F(it,'note');
  let html=`<div class="proj-cat">${cat?cat.ico+' ':''}${catName}${isCustom?` <span class="proj-custom-badge">⭐ ${UI.customTag[lang]}</span>`:''}</div>
    <div class="proj-name">${nm}</div>`;
  if(sub && sub!==nm) html+=`<div class="proj-name-en">${sub}</div>`;
  html+=`<div class="proj-ratio ${ratioClass(it.kind)}">${r}</div>`;
  if(useTxt) html+=`<div class="proj-use">${useTxt}</div>`;
  if(noteTxt) html+=`<div class="proj-note">${noteTxt}</div>`;
  projStage.innerHTML=html;
  document.getElementById('projCount').textContent=`${projIndex+1} / ${projItems.length}`;
  document.getElementById('projPrev').disabled = projIndex===0;
  document.getElementById('projNext').disabled = projIndex===projItems.length-1;
}
function projGo(delta){
  const n=projIndex+delta;
  if(n<0||n>=projItems.length) return;
  projIndex=n; projRender();
}
function openProjector(){
  if(!allEntries().length) return;
  document.getElementById('projHint').textContent = UI.projHint[lang];
  document.getElementById('projMenuLabel').textContent = UI.projSections[lang];
  showProjMenu();                       // open to the section picker first
  projOverlay.classList.add('on');
  projOverlay.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  const el=document.documentElement;
  const rq=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
  if(rq){ try{ rq.call(el).catch(()=>{}); }catch(e){} }
  document.addEventListener('keydown', projKey);
}
function closeProjector(){
  projOverlay.classList.remove('on');
  projOverlay.classList.remove('menu-open');
  projOverlay.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
  document.removeEventListener('keydown', projKey);
  if(document.fullscreenElement){ try{ document.exitFullscreen().catch(()=>{}); }catch(e){} }
  else if(document.webkitFullscreenElement){ try{ document.webkitExitFullscreen(); }catch(e){} }
}
function projKey(e){
  const menuOpen=projOverlay.classList.contains('menu-open');
  if(e.key==='Escape'){
    if(menuOpen) closeProjector();      // Esc from the menu exits
    else showProjMenu();                // Esc from a slide returns to the menu
    return;
  }
  if(menuOpen) return;                  // arrows do nothing on the menu
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); projGo(1); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); projGo(-1); }
  else if(e.key==='Home'){ projIndex=0; projRender(); }
  else if(e.key==='End'){ projIndex=projItems.length-1; projRender(); }
}
document.getElementById('printBtn').onclick=openProjector;
document.getElementById('projClose').onclick=closeProjector;
document.getElementById('projMenuBtn').onclick=showProjMenu;   // back to section picker
document.getElementById('projPrev').onclick=()=>projGo(-1);
document.getElementById('projNext').onclick=()=>projGo(1);
// tap left/right half of stage to navigate; swipe support
projStage.addEventListener('click',(e)=>{
  const mid=projStage.getBoundingClientRect().left+projStage.getBoundingClientRect().width/2;
  projGo(e.clientX<mid?-1:1);
});
let projTouchX=null;
projStage.addEventListener('touchstart',(e)=>{ projTouchX=e.touches[0].clientX; },{passive:true});
projStage.addEventListener('touchend',(e)=>{
  if(projTouchX===null) return;
  const dx=e.changedTouches[0].clientX-projTouchX;
  if(Math.abs(dx)>40) projGo(dx<0?1:-1);
  projTouchX=null;
});
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement && projOverlay.classList.contains('on')) closeProjector();
});

/* ================= SEARCH ================= */
searchEl.addEventListener('input',e=>{
  query=e.target.value.trim();
  clearBtn.classList.toggle('show',query.length>0);
  render();
});
clearBtn.onclick=()=>{ searchEl.value='';query='';clearBtn.classList.remove('show');render();searchEl.focus(); };

    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M12 8c-3 0-5 2-5 5v7h10v-7c0-3-2-5-5-5z"/><path d="M9 20v-4M15 20v-4"/></svg><div>'+UI.sugarNote[l]+'</div>';

/* ================= TEXT SIZE ================= */
const FS_STEPS=[1, 1.15, 1.3, 1.5];
let fsIndex=0;
const tsDown=document.getElementById('tsDown');
const tsUp=document.getElementById('tsUp');

function applyFs(){
  document.documentElement.style.setProperty('--fs', FS_STEPS[fsIndex]);
  tsDown.disabled = fsIndex<=0;
  tsUp.disabled = fsIndex>=FS_STEPS.length-1;
  // reflow any open cards so their expanded height matches new text size
  listEl.querySelectorAll('.card.open').forEach(card=>{
    const body=card.querySelector('.card-body');
    body.style.maxHeight=body.querySelector('.card-body-inner').scrollHeight+'px';
  });
  try{ localStorage.setItem('enzymeFs', fsIndex); }catch(e){}
}
tsDown.onclick=()=>{ if(fsIndex>0){ fsIndex--; applyFs(); } };
tsUp.onclick=()=>{ if(fsIndex<FS_STEPS.length-1){ fsIndex++; applyFs(); } };
try{
  const saved=parseInt(localStorage.getItem('enzymeFs'),10);
  if(!isNaN(saved)&&saved>=0&&saved<FS_STEPS.length) fsIndex=saved;
}catch(e){}

/* ================= INIT ================= */
setLang('zh');
applyFs();

/* ================= PWA: register service worker ================= */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      // when a new SW is found and installed while the app is open, activate it
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            // a newer version is ready; take over on next load
            nw.postMessage('skipWaiting');
          }
        });
      });
    }).catch(() => { /* offline install or unsupported — app still works */ });

    // reload once when the new SW takes control, so users get the latest build
    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}
