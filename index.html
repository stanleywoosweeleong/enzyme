<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3a2410">
<title>环保酵素稀释比例查询 · Eco-Enzyme Dilution Guide</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<!-- iOS standalone / home-screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="环保酵素">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<!-- favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  :root{
    --molasses:#3a2410;
    --molasses-2:#5a3818;
    --amber:#c47b2e;
    --amber-bright:#e0983c;
    --honey:#f0c14b;
    --cream:#f7efe0;
    --cream-2:#efe3cd;
    --paper:#fdf9f0;
    --leaf:#5c7a3d;
    --leaf-deep:#3f5a28;
    --ink:#2c1e12;
    --ink-soft:#6b543f;
    --line:#e3d3b6;
    --danger:#a8432a;
    --shadow:rgba(58,36,16,.14);
    /* readable-text scale, driven by A-/A+ control (1 = default) */
    --fs:1;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:"PingFang SC","Noto Sans SC","Hiragino Sans GB","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.55;
    padding-bottom:env(safe-area-inset-bottom);
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(circle at 18% 8%, rgba(240,193,75,.18), transparent 42%),
      radial-gradient(circle at 88% 96%, rgba(92,122,61,.12), transparent 46%),
      var(--cream);
  }

  /* ---------- header ---------- */
  header{
    position:relative;
    background:linear-gradient(155deg,var(--molasses),var(--molasses-2) 70%,#6b4620);
    color:var(--cream);
    padding:calc(env(safe-area-inset-top) + 20px) 20px 46px;
    overflow:hidden;
  }
  header::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:34px;
    background:var(--cream);
    clip-path:polygon(0 100%,100% 100%,100% 40%,0 100%);
  }
  .drop{
    position:absolute;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    background:radial-gradient(circle at 38% 30%, rgba(240,193,75,.5), rgba(196,123,46,.25));
    filter:blur(.3px);opacity:.5;pointer-events:none;
  }
  .brandline{display:flex;align-items:center;gap:9px;font-size:12.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--honey);font-weight:600;margin-bottom:12px;}
  .brandline .seed{width:22px;height:22px;flex:none;}
  h1{font-size:26px;line-height:1.2;font-weight:800;letter-spacing:.01em;}
  h1 .en{display:block;font-size:13px;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(247,239,224,.72);margin-top:7px;}
  .recipe{
    margin-top:16px;display:inline-flex;align-items:center;gap:10px;
    background:rgba(247,239,224,.1);border:1px solid rgba(240,193,75,.35);
    padding:8px 14px;border-radius:100px;font-size:calc(14px * var(--fs));font-weight:600;
    backdrop-filter:blur(4px);
  }
  .recipe b{color:var(--honey);font-size:15px;letter-spacing:.03em;}
  .recipe .sep{opacity:.4;}

  /* ---------- controls ---------- */
  .controls{padding:4px 16px 0;position:relative;z-index:2;margin-top:-30px;}
  .searchwrap{position:relative;}
  .searchwrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);
    width:19px;height:19px;color:var(--amber);pointer-events:none;}
  #search{
    width:100%;border:1.5px solid var(--line);background:var(--paper);
    border-radius:15px;padding:16px 16px 16px 44px;font-size:calc(16.5px * var(--fs));color:var(--ink);
    box-shadow:0 6px 22px -12px var(--shadow);font-family:inherit;
    transition:border-color .18s,box-shadow .18s;
  }
  #search::placeholder{color:#b09a7e;}
  #search:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 4px rgba(196,123,46,.13);}
  #clearBtn{position:absolute;right:9px;top:50%;transform:translateY(-50%);
    border:none;background:var(--cream-2);color:var(--ink-soft);width:30px;height:30px;
    border-radius:50%;font-size:17px;cursor:pointer;display:none;align-items:center;justify-content:center;}
  #clearBtn.show{display:flex;}

  .toolrow{display:flex;gap:8px;margin-top:11px;align-items:center;}
  .langtoggle{
    display:flex;background:var(--cream-2);border-radius:11px;padding:3px;gap:2px;flex:none;
    border:1px solid var(--line);
  }
  .langtoggle button{
    border:none;background:transparent;padding:7px 13px;border-radius:8px;
    font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit;
    transition:.15s;
  }
  .langtoggle button.active{background:var(--molasses);color:var(--honey);box-shadow:0 2px 6px -2px var(--shadow);}
  .count{margin-left:auto;font-size:12.5px;color:var(--ink-soft);font-weight:600;
    white-space:nowrap;padding-right:2px;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  @media (max-width:380px){
    .count{font-size:11.5px;}
  }

  /* text-size control (A- / A+) */
  .textsize{
    display:flex;align-items:center;background:var(--cream-2);border:1px solid var(--line);
    border-radius:11px;padding:2px;gap:0;flex:none;
  }
  .textsize button{
    display:flex;align-items:baseline;justify-content:center;gap:1px;
    border:none;background:transparent;color:var(--molasses);cursor:pointer;font-family:inherit;
    padding:7px 11px;border-radius:9px;line-height:1;transition:background .15s;
  }
  .textsize button:active{background:var(--line);}
  .textsize button:disabled{opacity:.35;cursor:default;}
  .textsize .ts-a{font-weight:800;font-size:14px;}
  .textsize .ts-a.ts-big{font-size:18px;}
  .textsize .ts-sign{font-weight:800;font-size:12px;}
  .ts-divider{width:1px;height:20px;background:var(--line);}

  .chips{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:9px;padding:16px 16px 6px;max-width:640px;margin:0 auto;
  }
  .chip{
    border:1.5px solid var(--line);background:var(--paper);color:var(--ink-soft);
    padding:12px 6px 10px;border-radius:16px;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    transition:transform .12s,background .15s,border-color .15s,color .15s,box-shadow .15s;
    min-height:74px;text-align:center;box-shadow:0 3px 10px -8px var(--shadow);
  }
  .chip:active{transform:scale(.95);}
  .chip .ico{
    font-size:24px;line-height:1;
    width:40px;height:40px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    background:var(--cream-2);transition:background .15s;
  }
  .chip .lbl{font-size:calc(12.5px * var(--fs));font-weight:800;letter-spacing:.01em;line-height:1.2;}
  .chip.active{
    background:var(--molasses);border-color:var(--molasses);color:var(--honey);
    box-shadow:0 8px 20px -12px var(--shadow);
  }
  .chip.active .ico{background:rgba(240,193,75,.16);}
  /* custom filter chip — subtle amber dashed accent to distinguish it */
  .chip-custom{border-style:dashed;border-color:var(--amber);}
  .chip-custom .ico{background:rgba(196,123,46,.12);}
  .chip-custom.active{background:var(--amber);border-color:var(--amber);color:#fff;border-style:solid;}
  .chip-custom.active .ico{background:rgba(255,255,255,.2);}
  /* favourites filter chip — heart accent */
  .chip-fav .ico{color:#e0455e;background:rgba(224,69,94,.1);}
  .chip-fav.active{background:#e0455e;border-color:#e0455e;color:#fff;}
  .chip-fav.active .ico{background:rgba(255,255,255,.22);color:#fff;}

  /* ---------- add custom entry ---------- */
  .addwrap{max-width:640px;margin:0 auto;padding:2px 16px 0;}
  .add-entry-btn{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    background:var(--cream-2);color:var(--molasses);border:1.5px dashed var(--amber);
    border-radius:14px;padding:13px;font-size:calc(14px * var(--fs));font-weight:800;
    cursor:pointer;font-family:inherit;transition:background .15s,transform .12s;
  }
  .add-entry-btn:active{transform:scale(.98);}
  .add-entry-btn:hover{background:var(--cream);}
  .add-entry-btn svg{width:19px;height:19px;color:var(--amber);}

  /* share / import custom tricks */
  .share-tricks-row{display:flex;gap:10px;margin-top:10px;}
  .tricks-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
    background:transparent;color:var(--amber);border:1px solid var(--line);
    border-radius:12px;padding:10px;font-size:calc(12.5px * var(--fs));font-weight:700;
    cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s;
  }
  .tricks-btn:hover{background:var(--cream-2);border-color:var(--amber);}
  .tricks-btn:active{transform:scale(.98);}
  .tricks-btn svg{width:16px;height:16px;flex:none;}
  .tricks-intro{font-size:calc(13px * var(--fs));line-height:1.6;color:var(--ink-soft);margin-bottom:12px;}
  .tricks-code{
    width:100%;min-height:110px;resize:vertical;box-sizing:border-box;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;
    background:var(--cream-2);color:var(--ink);border:1px solid var(--line);border-radius:12px;
    padding:12px;word-break:break-all;
  }
  .tricks-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;}
  .tricks-action-btn{
    flex:1;min-width:120px;background:var(--cream-2);color:var(--molasses);
    border:1px solid var(--line);border-radius:12px;padding:12px;font-size:calc(13.5px * var(--fs));
    font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s;
  }
  .tricks-action-btn:hover{background:var(--cream);}
  .tricks-action-btn:active{transform:scale(.98);}
  .tricks-action-btn.primary{background:var(--amber);color:#fff;border-color:var(--amber);}
  .tricks-action-btn.primary:hover{background:var(--amber-bright);}
  .import-result{margin-top:14px;font-size:calc(13px * var(--fs));line-height:1.6;}
  .import-result.ok{color:var(--leaf-deep);font-weight:700;}
  .import-result.err{color:var(--danger);font-weight:700;}

  /* custom entry markers */
  .custom-tag{
    display:inline-block;vertical-align:middle;margin-left:8px;
    background:var(--amber);color:#fff;font-size:calc(10.5px * var(--fs));font-weight:800;
    padding:2px 8px;border-radius:100px;letter-spacing:.02em;
  }
  .custom-actions{display:flex;gap:9px;margin-top:11px;}
  .ca-edit,.ca-del{
    display:inline-flex;align-items:center;gap:6px;flex:1;justify-content:center;
    border-radius:11px;padding:11px;font-size:calc(13px * var(--fs));font-weight:800;
    cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--cream-2);
  }
  .ca-edit{color:var(--molasses);}
  .ca-del{color:var(--danger);border-color:rgba(168,67,42,.3);background:rgba(168,67,42,.06);}
  .ca-edit svg,.ca-del svg{width:15px;height:15px;}

  /* ---------- entry form ---------- */
  .ef-row{margin-bottom:16px;}
  .ef-label{display:block;font-size:calc(12.5px * var(--fs));font-weight:800;color:var(--ink-soft);margin-bottom:8px;}
  .ef-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
  .ef-cat{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    border:1.5px solid var(--line);background:var(--paper);border-radius:12px;
    padding:9px 4px;cursor:pointer;font-family:inherit;transition:.12s;
  }
  .ef-cat .i{font-size:20px;line-height:1;}
  .ef-cat .t{font-size:calc(11px * var(--fs));font-weight:700;color:var(--ink-soft);text-align:center;line-height:1.2;}
  .ef-cat.sel{border-color:var(--molasses);background:var(--cream-2);}
  .ef-cat.sel .t{color:var(--molasses);}
  .ef-kinds{display:flex;gap:6px;}
  .ef-kind{
    flex:1;border:1.5px solid var(--line);background:var(--paper);border-radius:10px;
    padding:10px 4px;font-size:calc(11.5px * var(--fs));font-weight:700;color:var(--ink-soft);
    cursor:pointer;font-family:inherit;text-align:center;transition:.12s;
  }
  .ef-kind.sel{border-color:var(--molasses);background:var(--molasses);color:var(--honey);}
  .ef-langtabs{display:flex;gap:6px;margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:0;}
  .ef-langtab{
    border:none;background:transparent;border-bottom:2.5px solid transparent;
    padding:8px 12px 9px;font-size:calc(13px * var(--fs));font-weight:800;color:var(--ink-soft);
    cursor:pointer;font-family:inherit;margin-bottom:-1px;
  }
  .ef-langtab.sel{color:var(--molasses);border-bottom-color:var(--amber);}
  .ef-langtab .flag{opacity:.55;font-size:calc(10px * var(--fs));margin-left:4px;font-weight:700;}
  .ef-langtab.filled .flag{opacity:1;color:var(--leaf);}
  .ef-field{margin-bottom:13px;}
  .ef-field label{display:block;font-size:calc(12px * var(--fs));font-weight:800;color:var(--ink-soft);margin-bottom:6px;}
  .ef-field input,.ef-field textarea{
    width:100%;border:1.5px solid var(--line);background:var(--paper);border-radius:11px;
    padding:11px 13px;font-size:calc(14.5px * var(--fs));font-family:inherit;color:var(--ink);outline:none;
    line-height:1.5;
  }
  .ef-field input:focus,.ef-field textarea:focus{border-color:var(--amber);}
  .ef-field textarea{resize:vertical;min-height:70px;}
  .ef-hint{
    font-size:calc(12px * var(--fs));color:var(--ink-soft);line-height:1.5;
    background:rgba(196,123,46,.08);border-radius:10px;padding:10px 12px;margin:4px 0 16px;
  }
  .ef-actions{display:flex;gap:10px;}
  .ef-cancel{
    flex:0 0 auto;padding:14px 20px;border-radius:13px;border:1px solid var(--line);
    background:var(--cream-2);color:var(--ink-soft);font-size:calc(14.5px * var(--fs));font-weight:800;
    cursor:pointer;font-family:inherit;
  }
  .ef-save{
    flex:1;padding:14px;border-radius:13px;border:none;background:var(--molasses);color:var(--honey);
    font-size:calc(15px * var(--fs));font-weight:800;cursor:pointer;font-family:inherit;
  }
  .ef-save:active,.ef-cancel:active{transform:scale(.98);}

  /* in-app confirm dialog (native confirm() is blocked in installed PWAs) */
  .confirm-bg{align-items:center!important;padding:24px;z-index:400;}
  .confirm-box{
    background:var(--cream);width:100%;max-width:360px;border-radius:20px;
    padding:24px 22px 18px;box-shadow:0 24px 60px -20px rgba(0,0,0,.5);
    animation:popIn .2s ease;
  }
  @keyframes popIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
  .confirm-msg{font-size:calc(16px * var(--fs));font-weight:700;color:var(--ink);line-height:1.5;text-align:center;margin-bottom:20px;}
  .confirm-actions{display:flex;gap:10px;}
  .confirm-no,.confirm-yes{
    flex:1;padding:14px;border-radius:13px;font-size:calc(14.5px * var(--fs));font-weight:800;
    cursor:pointer;font-family:inherit;border:none;
  }
  .confirm-no{background:var(--cream-2);color:var(--ink-soft);border:1px solid var(--line);}
  .confirm-yes{background:var(--danger);color:#fff;}
  .confirm-no:active,.confirm-yes:active{transform:scale(.98);}

  /* ---------- list ---------- */  main{padding:8px 16px 40px;max-width:640px;margin:0 auto;}
  .grouphdr{
    display:flex;align-items:center;gap:9px;margin:22px 2px 12px;
    cursor:pointer;user-select:none;
  }
  .grouphdr .ico{
    width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:18px;flex:none;background:var(--cream-2);box-shadow:inset 0 0 0 1px var(--line);
  }
  .grouphdr .ghdr-main{flex:none;}
  .grouphdr h2{font-size:calc(18px * var(--fs));font-weight:800;color:var(--molasses-2);letter-spacing:.01em;}
  .grouphdr .en{font-size:calc(12px * var(--fs));font-weight:600;color:var(--ink-soft);letter-spacing:.05em;
    text-transform:uppercase;display:block;margin-top:1px;}
  .grouphdr .bar{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);margin-left:2px;}
  .grouphdr .ghdr-chev{flex:none;display:flex;align-items:center;justify-content:center;color:var(--amber);
    transition:transform .25s ease;width:24px;height:24px;}
  .grouphdr .ghdr-chev svg{width:16px;height:16px;}
  .grouphdr.collapsed .ghdr-chev{transform:rotate(-90deg);}

  .group-cards{overflow:hidden;max-height:20000px;transition:max-height .35s ease,opacity .2s ease;}
  .group-cards.collapsed{max-height:0!important;opacity:0;pointer-events:none;margin:0;}

  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:18px;
    margin-bottom:12px;overflow:hidden;box-shadow:0 4px 16px -13px var(--shadow);
    transition:box-shadow .2s,border-color .2s;
  }
  .card.open{box-shadow:0 12px 34px -18px var(--shadow);border-color:var(--cream-2);}

  /* head is a 2-row grid: [icon | title+ratio | chevron] */
  .card-head{
    display:grid;
    grid-template-columns:auto 1fr auto auto;
    align-items:center;
    gap:12px;padding:15px 16px;cursor:pointer;user-select:none;
  }
  .card-ico{
    width:46px;height:46px;border-radius:13px;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:23px;
    background:linear-gradient(150deg,var(--cream-2),#e6d4b4);
    box-shadow:inset 0 1px 2px rgba(255,255,255,.6);
  }
  .card-main{min-width:0;}
  .card-title{
    font-size:calc(17.5px * var(--fs));font-weight:800;color:var(--ink);letter-spacing:.01em;
    line-height:1.3;
    /* stop long CJK names from stacking into single columns */
    word-break:normal;overflow-wrap:break-word;
  }
  .card-title .en{
    display:block;font-size:calc(12.5px * var(--fs));font-weight:600;color:var(--ink-soft);
    letter-spacing:.03em;margin-top:2px;text-transform:none;line-height:1.35;
  }
  .ratio-pill{
    display:inline-block;margin-top:9px;
    background:var(--molasses);color:var(--honey);font-weight:800;font-size:calc(15.5px * var(--fs));
    padding:7px 13px;border-radius:10px;letter-spacing:.02em;
    font-variant-numeric:tabular-nums;line-height:1.35;
    max-width:100%;
  }
  .ratio-pill.strong{background:var(--danger);color:#ffe9df;}
  .ratio-pill.neat{background:var(--leaf-deep);color:#e8f2d8;}
  /* heart favourite button */
  .fav-btn{
    flex:none;align-self:start;margin-top:8px;
    width:34px;height:34px;border:none;background:transparent;cursor:pointer;padding:0;
    display:flex;align-items:center;justify-content:center;border-radius:50%;
    transition:background .15s;
  }
  .fav-btn:active{background:rgba(168,67,42,.08);}
  .fav-btn svg{
    width:23px;height:23px;
    fill:none;stroke:var(--ink-soft);stroke-width:1.8px;
    stroke-linejoin:round;stroke-linecap:round;
    transition:fill .18s,stroke .18s,transform .18s;
  }
  .fav-btn.on svg{fill:#e0455e;stroke:#e0455e;}
  @keyframes heartPop{0%{transform:scale(1);}35%{transform:scale(1.4);}70%{transform:scale(.9);}100%{transform:scale(1);}}
  .fav-btn.pop svg{animation:heartPop .34s ease;}
  .chev{
    width:26px;height:26px;flex:none;align-self:start;margin-top:11px;
    color:var(--amber);transition:transform .25s;
    display:flex;align-items:center;justify-content:center;
  }
  .chev svg{width:16px;height:16px;}
  .card.open .chev{transform:rotate(180deg);}

  .card-body{
    max-height:0;overflow:hidden;transition:max-height .3s ease;
  }
  .card-body-inner{padding:2px 15px 16px;border-top:1px dashed var(--line);margin:0 0 0;}
  .card-body-inner>div:first-child{padding-top:13px;}
  .field{margin-bottom:13px;}
  .field:last-child{margin-bottom:0;}
  .field-label{
    display:flex;align-items:center;gap:6px;font-size:calc(12.5px * var(--fs));font-weight:800;
    color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;
  }
  .field-label .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex:none;}
  .field-text{font-size:calc(16px * var(--fs));color:var(--ink);line-height:1.65;}
  .field.func .field-label{color:var(--leaf);}
  .field.func .field-label .dot{background:var(--leaf);}

    border-radius:14px;padding:15px 16px;margin-bottom:12px;
  }
  .relief-card h4{font-size:calc(16.5px * var(--fs));font-weight:800;color:var(--ink);margin-bottom:4px;
    display:flex;align-items:center;gap:8px;}
  .relief-card h4 .num{
    width:24px;height:24px;border-radius:8px;background:var(--danger);color:#fff;
    font-size:13px;display:flex;align-items:center;justify-content:center;flex:none;}
  .relief-card .r-ratio{
    display:inline-block;background:var(--molasses);color:var(--honey);font-weight:800;
    font-size:calc(14.5px * var(--fs));padding:5px 11px;border-radius:9px;margin:6px 0 8px;}
  .relief-card p{font-size:calc(14.5px * var(--fs));color:var(--ink);line-height:1.65;}
  .relief-shareall{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    background:#25863f;color:#fff;border:none;border-radius:13px;
    padding:15px;font-size:calc(15px * var(--fs));font-weight:800;cursor:pointer;font-family:inherit;
    box-shadow:0 8px 20px -12px rgba(37,134,63,.8);
    margin:6px 0 4px;
  }
  .relief-shareall:active{transform:scale(.98);}
  .relief-shareall:disabled{opacity:.6;cursor:default;}
  .relief-shareall svg{width:19px;height:19px;flex:none;}

  /* image preview fallback (long-press to save on iOS) */
  .img-preview{
    position:fixed;inset:0;z-index:300;background:rgba(20,12,4,.9);
    display:none;align-items:center;justify-content:center;padding:18px;
  }
  .img-preview.show{display:flex;}
  .img-preview-inner{
    position:relative;max-width:100%;max-height:100%;display:flex;flex-direction:column;align-items:center;gap:12px;
  }
  .img-preview-tip{
    color:#f7efe0;font-size:calc(14px * var(--fs));font-weight:700;text-align:center;
    background:rgba(247,239,224,.12);padding:10px 16px;border-radius:100px;
    display:flex;align-items:center;gap:8px;
  }
  .img-preview img{
    max-width:100%;max-height:78vh;object-fit:contain;border-radius:14px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.7);
    -webkit-touch-callout:default; /* allow iOS long-press menu */
  }
  .img-preview-close{
    position:absolute;top:-6px;right:-6px;width:38px;height:38px;border-radius:50%;
    border:none;background:#fdf9f0;color:#3a2410;font-size:18px;font-weight:800;cursor:pointer;
    box-shadow:0 4px 12px -4px rgba(0,0,0,.5);
  }
  .print-hint{
    background:rgba(92,122,61,.09);border-radius:12px;padding:13px 14px;font-size:calc(14px * var(--fs));
    color:var(--leaf-deep);line-height:1.55;margin-bottom:8px;font-weight:600;
    display:flex;gap:9px;}
  .print-hint svg{width:17px;height:17px;flex:none;margin-top:1px;}

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 26px);transform:translateX(-50%) translateY(20px);
    background:var(--molasses);color:var(--cream);padding:12px 20px;border-radius:100px;
    font-size:13.5px;font-weight:700;z-index:200;opacity:0;pointer-events:none;
    transition:opacity .22s,transform .22s;box-shadow:0 10px 30px -10px var(--shadow);white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- PRINT / PROJECTOR ---------- */
  @media print{
    body::before,header .drop{display:none!important;}
    .controls,.chips,.relief-btn,footer,.langtoggle,.modal-bg,.toast,.chev,.share-row{display:none!important;}
    header{background:none!important;color:#2c1e12!important;padding:0 0 12px!important;border-bottom:3px solid #3a2410;}
    header::after{display:none!important;}
    header h1{color:#2c1e12!important;font-size:24pt;}
    header h1 .en,.brandline span{color:#5a3818!important;}
    .brandline .seed path[fill]{fill:#5c7a3d!important;}
    .recipe{background:none!important;border:1.5px solid #3a2410!important;color:#2c1e12!important;}
    .recipe b{color:#3a2410!important;}
    main{max-width:none;padding:0;}
    .grouphdr{break-after:avoid;margin-top:16pt;}
    .grouphdr h2{color:#2c1e12!important;font-size:14pt;}
    .card{break-inside:avoid;box-shadow:none!important;border:1px solid #bbb!important;
      margin-bottom:8pt;background:#fff!important;}
    .card-body{max-height:none!important;overflow:visible!important;}
    .card-body-inner{border-top:1px dashed #ccc;}
    .ratio-pill{background:#3a2410!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .ratio-pill.strong{background:#a8432a!important;}
    .ratio-pill.neat{background:#3f5a28!important;}
    .field.func{background:#f2f5eb!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .note{background:#faeee9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .card-ico{background:#eee!important;}
    @page{margin:14mm;}
  }
  body.printing .card-body{max-height:none!important;}
  body.printing .group-cards{max-height:none!important;opacity:1!important;pointer-events:auto!important;}
  @media print{ .group-cards{max-height:none!important;opacity:1!important;} .grouphdr .ghdr-chev{display:none;} }
</style>
</head>

  {cat:"personal",ico:"🦶",kind:"normal",zh:"泡脚",zhT:"泡腳",en:"Foot Bath",ms:"Rendam Kaki",ratioZh:"一桶温水 · 酵素 100 ml",ratioZhT:"一桶溫水 · 酵素 100 ml",ratioEn:"1 bucket warm water : 100 ml enzyme",ratioMs:"1 baldi air suam : 100 ml enzim",useZh:"一桶温水加入 100 ml 环保酵素，泡脚 20 分钟。加强版：小苏打与泻盐各五汤匙同泡。水温——心脏病或高血压者 38℃，普通人群 40℃。",useZhT:"一桶溫水加入 100 ml 環保酵素，泡腳 20 分鐘。加強版：小蘇打與瀉鹽各五湯匙同泡。水溫——心臟病或高血壓者 38℃，普通人群 40℃。",useEn:"Add 100 ml enzyme to a bucket of warm water; soak 20 minutes. Boost: add 5 tbsp each baking soda & Epsom salt. Temp — heart disease / high BP 38℃, general 40℃.",useMs:"Tambah 100 ml enzim ke baldi air suam; rendam 20 minit. Tambahan: 5 sudu besar soda bikarbonat & garam Epsom. Suhu — penyakit jantung / tekanan darah tinggi 38℃, umum 40℃.",funcZh:"排重金属、环境荷尔蒙、脚鸡眼、辐射与毒素等。长期用电子产品者、电疗及化疗者尤宜。",funcZhT:"排重金屬、環境荷爾蒙、腳雞眼、輻射與毒素等。長期用電子產品者、電療及化療者尤宜。",funcEn:"Removes heavy metals, environmental hormones, foot corns, radiation & toxins. Good for heavy device users, electro/chemo patients.",funcMs:"Membuang logam berat, hormon persekitaran, mata ikan, sinaran & toksin. Baik untuk pengguna peranti berat, pesakit elektroterapi/kemoterapi.",noteZh:"用后的水手尽量不要碰触，必须倒入马桶，请勿浇花或倒入泥土中。",noteZhT:"用後的水手儘量不要碰觸，必須倒入馬桶，請勿澆花或倒入泥土中。",noteEn:"Avoid touching used water with hands; pour into the toilet — do not water plants or soil.",noteMs:"Elak sentuh air terpakai dengan tangan; tuang ke dalam tandas — jangan siram tumbuhan atau tanah.",kw:"泡脚 foot bath 脚 泻盐 epsom 重金属 heavy metal 辐射 排毒"},
  {cat:"personal",ico:"🦟",kind:"normal",zh:"驱蚊 · 止痒",zhT:"驅蚊 · 止癢",en:"Repel Mosquitoes / Itch",ms:"Halau Nyamuk · Hilang Gatal",ratioZh:"稀释至 1000 倍 或 原液",ratioZhT:"稀釋至 1000 倍 或 原液",ratioEn:"Dilute to 1000×, or neat",ratioMs:"Cairkan 1000×, atau tulen",useZh:"叮咬后可直接喷涂。稀释液喷空间、拖地可驱蚊（拖地要稀释 100 倍以上）。",useZhT:"叮咬後可直接噴塗。稀釋液噴空間、拖地可驅蚊（拖地要稀釋 100 倍以上）。",useEn:"Spray directly after bites. Spray diluted enzyme in the air or when mopping to repel mosquitoes (mopping needs 100×+).",useMs:"Sembur terus selepas digigit. Sembur enzim dicairkan di udara atau semasa mengemop untuk halau nyamuk (mengemop perlu 100×+).",funcZh:"驱蚊、止痒、不留疤。",funcZhT:"驅蚊、止癢、不留疤。",funcEn:"Repels mosquitoes, stops itch, no scarring.",funcMs:"Menghalau nyamuk, hilangkan gatal, tanpa parut.",noteZh:"",noteZhT:"",noteEn:"",noteMs:"",kw:"驱蚊 止痒 mosquito itch 叮咬 bite 疤"},
  {cat:"personal",ico:"😷",kind:"normal",zh:"个人防护（喷口罩·手）",zhT:"個人防護（噴口罩·手）",en:"Personal Protection",ms:"Perlindungan Diri",ratioZh:"酵素 1 · 水 400（1:400）",ratioZhT:"酵素 1 · 水 400（1:400）",ratioEn:"Enzyme 1 : Water 400 (1:400)",ratioMs:"Enzim 1 · Air 400 (1:400)",useZh:"出外时，用稀释后的环保酵素喷在口罩里再套上，防止细菌入侵。也可喷在双手或身体，有效杀菌。",useZhT:"出外時，用稀釋後的環保酵素噴在口罩裡再套上，防止細菌入侵。也可噴在雙手或身體，有效殺菌。",useEn:"When going out, spray diluted enzyme inside the mask before wearing to block bacteria. Also spray on hands or body to sterilize.",useMs:"Ketika keluar, sembur enzim dicairkan di dalam pelitup sebelum memakainya untuk menghalang bakteria. Juga sembur pada tangan atau badan untuk mensteril.",funcZh:"有效杀菌，加强个人防护。",funcZhT:"有效殺菌，加強個人防護。",funcEn:"Effective sterilizing for personal protection.",funcMs:"Mensteril dengan berkesan untuk perlindungan diri.",noteZh:"",noteZhT:"",noteEn:"",noteMs:"",kw:"防护 protection 口罩 mask 杀菌 sterilize 手 hands 1:400"},
  {cat:"health",ico:"🩹",kind:"strong",zh:"外伤 · 伤口",zhT:"外傷 · 傷口",en:"Wounds & Injuries",ms:"Luka & Kecederaan",ratioZh:"稀释至 1000 倍 或 原液（最好 6 个月以上）",ratioZhT:"稀釋至 1000 倍 或 原液（最好 6 個月以上）",ratioEn:"Up to 1000×, or neat (best aged 6+ months)",ratioMs:"Sehingga 1000×, atau tulen (terbaik 6+ bulan)",useZh:"皮肤病、刀伤、烫伤、血流不止、发炎、肌肉关节疼痛、痔疮等，把受伤部位泡上或喷抹酵素原液，可马上止血，愈合后无伤痕。烫伤瞬间直接喷原液或浸在原液里，可消炎、消肿、清除水泡。落枕、腰肌劳损用原液加按摩。痔疮可稀释坐浴。肿处可用布或毛巾浸酵素后敷。受重大创伤可大量喝饮用酵素，紧急情况可用环保酵素。",useZhT:"皮膚病、刀傷、燙傷、血流不止、發炎、肌肉關節疼痛、痔瘡等，把受傷部位泡上或噴抹酵素原液，可馬上止血，癒合後無傷痕。燙傷瞬間直接噴原液或浸在原液裡，可消炎、消腫、清除水泡。落枕、腰肌勞損用原液加按摩。痔瘡可稀釋坐浴。腫處可用布或毛巾浸酵素後敷。受重大創傷可大量喝飲用酵素，緊急情況可用環保酵素。",useEn:"For skin conditions, cuts, burns, bleeding, inflammation, joint/muscle pain, hemorrhoids: soak or spray neat enzyme on the area — stops bleeding fast, heals without scars. For fresh burns, spray/soak neat to reduce inflammation, swelling & blisters. Stiff neck / strain: neat + massage. Hemorrhoids: diluted sitz bath. Swelling: apply enzyme-soaked cloth. Major trauma: drink edible enzyme in quantity; eco-enzyme in emergencies.",useMs:"Untuk masalah kulit, luka, melecur, pendarahan, radang, sakit sendi/otot, buasir: rendam atau sembur enzim tulen pada kawasan — hentikan pendarahan cepat, sembuh tanpa parut. Untuk melecur baru, sembur/rendam tulen. Leher kaku / terseliuh: tulen + urut. Buasir: rendaman duduk dicairkan. Bengkak: kain direndam enzim. Trauma besar: minum enzim boleh minum; enzim eko dalam kecemasan.",funcZh:"分解消除伤口坏死细胞，消炎消肿，快速修复受伤组织，让伤口愈合更快，对神经系统有很好的修复作用。",funcZhT:"分解消除傷口壞死細胞，消炎消腫，快速修復受傷組織，讓傷口癒合更快，對神經系統有很好的修復作用。",funcEn:"Clears dead tissue, reduces inflammation & swelling, speeds tissue repair, aids nervous-system recovery.",funcMs:"Membuang tisu mati, kurangkan radang & bengkak, cepatkan pembaikan tisu, bantu pemulihan sistem saraf.",noteZh:"这是民间使用经验，非医疗建议。严重伤口、糖尿病烂脚等请务必先就医。",noteZhT:"這是民間使用經驗，非醫療建議。嚴重傷口、糖尿病爛腳等請務必先就醫。",noteEn:"Folk-use experience, not medical advice. For serious wounds or diabetic foot, see a doctor first.",noteMs:"Pengalaman guna rakyat, bukan nasihat perubatan. Untuk luka serius atau kaki diabetik, jumpa doktor dahulu.",kw:"外伤 伤口 wound injury 烫伤 burn 刀伤 cut 止血 痔疮 消炎 糖尿"},
  {cat:"health",ico:"👄",kind:"normal",zh:"口腔（溃疡·牙痛）",zhT:"口腔（潰瘍·牙痛）",en:"Oral Care",ms:"Penjagaan Mulut",ratioZh:"稀释 10 到 100 倍",ratioZhT:"稀釋 10 到 100 倍",ratioEn:"Dilute 10 to 100×",ratioMs:"Cairkan 10 hingga 100×",useZh:"稀释后漱口或刷牙。",useZhT:"稀釋後漱口或刷牙。",useEn:"Rinse or brush with diluted enzyme.",useMs:"Kumur atau berus dengan enzim dicairkan.",funcZh:"可调节口腔溃疡、牙痛、牙酸、牙周炎、口臭等。",funcZhT:"可調節口腔潰瘍、牙痛、牙酸、牙周炎、口臭等。",funcEn:"Eases mouth ulcers, toothache, sensitivity, gum disease, bad breath.",funcMs:"Melegakan ulser mulut, sakit gigi, gigi sensitif, penyakit gusi, bau mulut.",noteZh:"民间使用经验，非医疗建议。",noteZhT:"民間使用經驗，非醫療建議。",noteEn:"Folk-use experience, not medical advice.",noteMs:"Pengalaman guna rakyat, bukan nasihat perubatan.",kw:"口腔 oral 溃疡 ulcer 牙痛 toothache 牙周炎 gum 口臭"},
  {cat:"health",ico:"👃",kind:"normal",zh:"鼻炎 · 喷嚏 · 流涕",zhT:"鼻炎 · 噴嚏 · 流涕",en:"Rhinitis / Sneezing",ms:"Rinitis / Bersin",ratioZh:"稀释 10 到 100 倍",ratioZhT:"稀釋 10 到 100 倍",ratioEn:"Dilute 10 to 100×",ratioMs:"Cairkan 10 hingga 100×",useZh:"棉签沾涂鼻孔，或喷涂鼻孔。更重要的是改善饮食——素食，还有生活习惯。",useZhT:"棉籤沾塗鼻孔，或噴塗鼻孔。更重要的是改善飲食——素食，還有生活習慣。",useEn:"Dab inside nostrils with a cotton swab, or spray. More importantly, improve diet (vegetarian) and lifestyle habits.",useMs:"Sapu dalam lubang hidung dengan kapas, atau sembur. Lebih penting, perbaiki diet (vegetarian) dan tabiat hidup.",funcZh:"减轻鼻塞、打喷嚏、流涕等状况至痊愈。",funcZhT:"減輕鼻塞、打噴嚏、流涕等狀況至痊癒。",funcEn:"Eases congestion, sneezing and runny nose toward recovery.",funcMs:"Melegakan hidung tersumbat, bersin dan hidung berair ke arah pemulihan.",noteZh:"民间使用经验，非医疗建议。",noteZhT:"民間使用經驗，非醫療建議。",noteEn:"Folk-use experience, not medical advice.",noteMs:"Pengalaman guna rakyat, bukan nasihat perubatan.",kw:"鼻炎 rhinitis 喷嚏 sneeze 流涕 鼻塞 nose 鼻孔"},
  {cat:"health",ico:"🧑",kind:"normal",zh:"皮肤（痘·过敏·皮炎）",zhT:"皮膚（痘·過敏·皮炎）",en:"Skin Care",ms:"Penjagaan Kulit",ratioZh:"稀释 或 原液",ratioZhT:"稀釋 或 原液",ratioEn:"Diluted or neat",ratioMs:"Dicairkan atau tulen",useZh:"青春痘、扁平疣、皮肤过敏、皮炎、手脚裂伤等，痘痘可原液点涂。脸部皮肤慎久用原液。白膜敷脸有美容特效。用面霜混合原液涂抹可保湿久些。妇科可坐浴或喷抹。",useZhT:"青春痘、扁平疣、皮膚過敏、皮炎、手腳裂傷等，痘痘可原液點塗。臉部皮膚慎久用原液。白膜敷臉有美容特效。用面霜混合原液塗抹可保溼久些。婦科可坐浴或噴抹。",useEn:"For acne, flat warts, skin allergy, dermatitis, cracked hands/feet: dab acne with neat enzyme. Use neat sparingly on facial skin. The surface film makes an excellent facial mask. Mix with cream for longer moisture. Gynecological: sitz bath or spray.",useMs:"Untuk jerawat, ketuat rata, alahan kulit, dermatitis, tangan/kaki merekah: sapu jerawat dengan enzim tulen. Guna tulen berhemat pada muka. Lapisan filem jadi pelapik muka yang baik. Campur dengan krim untuk kelembapan lebih lama. Ginekologi: rendaman duduk atau sembur.",funcZh:"皮肤恢复柔嫩光滑、补水、减除过敏。",funcZhT:"皮膚恢復柔嫩光滑、補水、減除過敏。",funcEn:"Restores soft smooth skin, hydrates, reduces allergies.",funcMs:"Memulih kulit lembut licin, melembap, kurangkan alahan.",noteZh:"民间使用经验，非医疗建议。脸部慎用原液。",noteZhT:"民間使用經驗，非醫療建議。臉部慎用原液。",noteEn:"Folk-use experience, not medical advice. Use neat cautiously on face.",noteMs:"Pengalaman guna rakyat, bukan nasihat perubatan. Guna tulen berhati-hati pada muka.",kw:"皮肤 skin 青春痘 acne 过敏 allergy 皮炎 dermatitis 疣 wart 敷脸"},
  {cat:"health",ico:"🦵",kind:"normal",zh:"脚气 · 脚癣 · 脚干裂",zhT:"腳氣 · 腳癬 · 腳乾裂",en:"Athlete's Foot / Cracks",ms:"Kurap Kaki / Rekahan",ratioZh:"一桶水放 2 瓶盖以上",ratioZhT:"一桶水放 2 瓶蓋以上",ratioEn:"2+ caps per bucket of water",ratioMs:"2+ penutup setiap baldi air",useZh:"40℃ 以下温水浸泡。糖尿病等引起的烂脚，用酵素原液泡，每天数次，无需换液，脏后再换液。脚气也可原液喷抹。静脉曲张、关节疼痛等除泡脚外可试原液喷涂后用布包裹。泡脚时水盖过小腿更佳，用毛巾盖住，最好能微微出汗；泡脚后不宜洗澡，可用好的油（如有机椰油）按摩后休息。",useZhT:"40℃ 以下溫水浸泡。糖尿病等引起的爛腳，用酵素原液泡，每天數次，無需換液，髒後再換液。腳氣也可原液噴抹。靜脈曲張、關節疼痛等除泡腳外可試原液噴塗後用布包裹。泡腳時水蓋過小腿更佳，用毛巾蓋住，最好能微微出汗；泡腳後不宜洗澡，可用好的油（如有機椰油）按摩後休息。",useEn:"Soak in warm water below 40℃. Diabetic foot ulcers: soak in neat enzyme several times daily, no need to change unless dirty. Athlete's foot: spray neat. Varicose veins / joint pain: besides soaking, try spraying neat then wrapping with cloth. Water above the calf is better; cover with a towel, ideally sweat lightly. Don't shower right after; massage with good oil (e.g. organic coconut) and rest.",useMs:"Rendam dalam air suam bawah 40℃. Ulser kaki diabetik: rendam dalam enzim tulen beberapa kali sehari, tak perlu tukar melainkan kotor. Kurap kaki: sembur tulen. Urat bunting / sakit sendi: selain merendam, cuba sembur tulen kemudian balut dengan kain. Air atas betis lebih baik; tutup dengan tuala, elok berpeluh sedikit. Jangan mandi selepas itu; urut dengan minyak baik (cth. minyak kelapa organik) dan rehat.",funcZh:"消除或好转，排触重金属、化学污染、电磁辐射，消除疲劳等。",funcZhT:"消除或好轉，排觸重金屬、化學汙染、電磁輻射，消除疲勞等。",funcEn:"Clears or improves; expels heavy metals, chemical pollution, EM radiation; relieves fatigue.",funcMs:"Menghilangkan atau memperbaik; membuang logam berat, pencemaran kimia, sinaran EM; melegakan keletihan.",noteZh:"民间使用经验，非医疗建议。糖尿病烂脚请配合就医。",noteZhT:"民間使用經驗，非醫療建議。糖尿病爛腳請配合就醫。",noteEn:"Folk-use experience, not medical advice. See a doctor for diabetic foot.",noteMs:"Pengalaman guna rakyat, bukan nasihat perubatan. Jumpa doktor untuk kaki diabetik.",kw:"脚气 脚癣 athlete foot 脚臭 干裂 crack 糖尿 静脉曲张 varicose"},

/* ================= STATE ================= */
let lang = 'zh';
let activeCat = 'all';
let query = '';
const openSet = new Set();

/* ---- custom user entries (persisted) ---- */
let CUSTOM = [];
try{ const raw=localStorage.getItem('enzymeCustom'); if(raw) CUSTOM=JSON.parse(raw)||[]; }catch(e){ CUSTOM=[]; }
function saveCustom(){ try{ localStorage.setItem('enzymeCustom', JSON.stringify(CUSTOM)); }catch(e){} }
/* stable id for any entry (built-in uses zh name, custom uses cid) */
function entryId(it){ return it.cid || it.zh; }
/* merged list: built-ins + custom */
function allEntries(){ return DATA.concat(CUSTOM); }

/* ---- collapsible category groups (persisted) ---- */
let collapsedCats;
try{
  const raw=localStorage.getItem('enzymeCollapsed');
  if(raw!==null){ collapsedCats=new Set(JSON.parse(raw)||[]); }
  else { collapsedCats=new Set(Object.keys(CATS)); } // first run: start all collapsed (compact home screen)
}catch(e){ collapsedCats=new Set(); }
function saveCollapsed(){ try{ localStorage.setItem('enzymeCollapsed', JSON.stringify([...collapsedCats])); }catch(e){} }

/* ---- favourites (persisted) — heart ❤ to spread love among members ---- */
let favSet;
try{ const raw=localStorage.getItem('enzymeFavs'); favSet=new Set(raw?JSON.parse(raw):[]); }catch(e){ favSet=new Set(); }
function saveFavs(){ try{ localStorage.setItem('enzymeFavs', JSON.stringify([...favSet])); }catch(e){} }
function isFav(id){ return favSet.has(id); }
function toggleFav(id){
  if(favSet.has(id)) favSet.delete(id); else favSet.add(id);
  saveFavs();
}

const listEl=document.getElementById('list');
const chipsEl=document.getElementById('chips');
const countEl=document.getElementById('count');
const searchEl=document.getElementById('search');
const clearBtn=document.getElementById('clearBtn');
const toastEl=document.getElementById('toast');

/* field accessor by language with graceful fallback */
function F(item, base){
  const map={zh:base+'Zh', zhT:base+'ZhT', en:base+'En', ms:base+'Ms'};
  return item[map[lang]] || item[map.zh] || item[map.en] || item[map.ms] || '';
}
function name(item){ return item[lang] || item.zh || item.en || item.ms || item.zhT || ''; }
function ratio(item){ return F(item,'ratio'); }
function ratioClass(k){ return k==='strong'?'strong':(k==='neat'?'neat':''); }

/* ================= LANG MENU ================= */
const langToggle=document.getElementById('langToggle');
const langBtn=document.getElementById('langBtn');
const langMenu=document.getElementById('langMenu');
const langLabel=document.getElementById('langLabel');

function buildLangMenu(){
  langMenu.innerHTML=Object.entries(LANGS).map(([k,v])=>
    `<button data-l="${k}" class="${k===lang?'sel':''}" role="menuitem">
      <span class="native">${v.native}</span><span class="sub">${v.sub}</span></button>`).join('');
  langMenu.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{ setLang(b.dataset.l); langToggle.classList.remove('open'); };
  });
}
langBtn.onclick=(e)=>{ e.stopPropagation(); langToggle.classList.toggle('open'); };
document.addEventListener('click',()=>langToggle.classList.remove('open'));

/* ================= CHIPS ================= */
function buildChips(){
  let html=`<button class="chip ${activeCat==='all'?'active':''}" data-cat="all">
      <span class="ico">🗂️</span><span class="lbl">${UI.allUses[lang]}</span></button>`;
  for(const [key,c] of Object.entries(CATS)){
    html+=`<button class="chip ${activeCat===key?'active':''}" data-cat="${key}">
      <span class="ico">${c.ico}</span><span class="lbl">${c[lang]}</span></button>`;
  }
  // favourites chip — only shown once the user has hearted something
  if(favSet.size>0){
    html+=`<button class="chip chip-fav ${activeCat==='fav'?'active':''}" data-cat="fav">
      <span class="ico"><svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span><span class="lbl">${UI.favFilter[lang]}</span></button>`;
  }
  // custom chip — only shown once the user has created custom entries
  if(CUSTOM.length>0){
    html+=`<button class="chip chip-custom ${activeCat==='custom'?'active':''}" data-cat="custom">
      <span class="ico">⭐</span><span class="lbl">${UI.customFilter[lang]}</span></button>`;
  }
  chipsEl.innerHTML=html;
  chipsEl.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick=()=>{
      activeCat=ch.dataset.cat; buildChips(); render();
      if(activeCat!=='all') listEl.scrollIntoView({behavior:'smooth',block:'start'});
    };
  });
}

/* ================= FILTER + RENDER ================= */
function matches(item){
  if(activeCat==='custom'){ if(!item.cid) return false; }
  else if(activeCat==='fav'){ if(!isFav(entryId(item))) return false; }
  else if(activeCat!=='all' && item.cat!==activeCat) return false;
  if(!query) return true;
  const q=query.toLowerCase();
  // build a haystack from ALL language variants of every searchable field
  // (so a search works regardless of the display language, and covers custom entries)
  const parts=[
    item.zh, item.zhT, item.en, item.ms, item.kw,
    item.ratioZh, item.ratioZhT, item.ratioEn, item.ratioMs,
    item.useZh, item.useZhT, item.useEn, item.useMs,
    item.funcZh, item.funcZhT, item.funcEn, item.funcMs,
    item.noteZh, item.noteZhT, item.noteEn, item.noteMs
  ];
  const hay=parts.filter(Boolean).join(' ').toLowerCase();
  return hay.includes(q);
}

function render(){
  const items=allEntries().filter(matches);
  countEl.textContent=UI.count[lang](items.length);
  updateTricksRow();
  if(items.length===0){
    if(activeCat==='fav' && !query){
      listEl.innerHTML=`<div class="noresult"><div class="big">🤍</div>
        <p>${UI.favFilter[lang]}</p><p class="sub">${UI.favEmpty[lang]}</p></div>`;
    }else{
      listEl.innerHTML=`<div class="noresult"><div class="big">🫙</div>
        <p>${UI.noResult[lang]}</p><p class="sub">${UI.noResultSub[lang]}</p></div>`;
    }
    return;
  }
  const order=Object.keys(CATS);
  const groups={};
  items.forEach(it=>{(groups[it.cat]=groups[it.cat]||[]).push(it);});
  // within each category, float favourites to the top in the order they were hearted
  const favOrder=[...favSet];                       // insertion order = order favourited
  const favRank=id=>{ const i=favOrder.indexOf(id); return i<0 ? Infinity : i; };
  for(const cat in groups){
    groups[cat].forEach((it,i)=>{ it.__i=i; });     // remember original order as tiebreaker
    groups[cat].sort((a,b)=>{
      const ra=favRank(entryId(a)), rb=favRank(entryId(b));
      if(ra!==rb) return ra-rb;                       // favourites first, in favourite order
      return a.__i-b.__i;                             // otherwise keep original order
    });
    groups[cat].forEach(it=>{ delete it.__i; });
  }
  // when searching or viewing a specific filter, always expand (results must be visible)
  const forceOpen = !!query || activeCat!=='all';
  let html='';
  for(const cat of order){
    if(!groups[cat]) continue;
    const c=CATS[cat];
    const other = lang==='en'? c.zh : c.en;
    const collapsed = !forceOpen && collapsedCats.has(cat);
    html+=`<div class="grouphdr ${collapsed?'collapsed':''}" data-cat="${cat}">
      <div class="ico">${c.ico}</div>
      <div class="ghdr-main"><h2>${c[lang]}</h2><span class="en">${other}</span></div>
      <div class="bar"></div>
      <div class="ghdr-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></div>
    </div>`;
    html+=`<div class="group-cards ${collapsed?'collapsed':''}" data-cards="${cat}">`;
    groups[cat].forEach(it=>{ html+=cardHtml(it); });
    html+=`</div>`;
  }
  listEl.innerHTML=html;
  wireGroups(forceOpen);
  wireCards();
}

function wireGroups(forceOpen){
  if(forceOpen) return; // headers aren't collapsible while searching/single-category
  listEl.querySelectorAll('.grouphdr').forEach(h=>{
    h.onclick=()=>{
      const cat=h.dataset.cat;
      const cards=listEl.querySelector(`[data-cards="${cat}"]`);
      if(collapsedCats.has(cat)){
        collapsedCats.delete(cat);
        h.classList.remove('collapsed'); cards.classList.remove('collapsed');
      }else{
        collapsedCats.add(cat);
        h.classList.add('collapsed'); cards.classList.add('collapsed');
      }
      saveCollapsed();
    };
  });
}

function cardHtml(it){
  const id=entryId(it);
  const isOpen=openSet.has(id);
  const title=name(it);
  const sub = lang==='en'? it.zh : it.en;
  const r=ratio(it);

  let body=`<div class="field"><div class="field-label"><span class="dot"></span>${UI.labelUse[lang]}</div>
    <div class="field-text">${useTxt}</div></div>`;

    <div class="field-text">${funcTxt}</div></div>`;
  if(noteTxt) body+=`<div class="note">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
    <div>${noteTxt}</div></div>`;
  body+=`<div class="share-row">
    <button class="share-btn" data-share="${encodeURIComponent(id)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg>
      ${UI.share[lang]}</button>
    <button class="copy-btn" data-copy="${encodeURIComponent(id)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span>${UI.copy[lang]}</span></button>
  </div>`;
  if(isCustom){
    body+=`<div class="custom-actions">
      <button class="ca-edit" data-edit="${encodeURIComponent(id)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>${UI.editEntry[lang]}</button>
      <button class="ca-del" data-del="${encodeURIComponent(id)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>${UI.delEntry[lang]}</button>

  }

  const faved=isFav(id);
  return `<div class="card ${isOpen?'open':''} ${faved?'faved':''}" data-id="${id}">
    <div class="card-head">
      <div class="card-ico">${it.ico}</div>

        <div class="card-title">${title}${isCustom?`<span class="custom-tag">${UI.customTag[lang]}</span>`:''}<span class="en">${sub}</span></div>

      </button>
      <div class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></div>

function wireCards(){
  listEl.querySelectorAll('.card-head').forEach(h=>{
    h.onclick=()=>{
      const card=h.closest('.card'), id=card.dataset.id;
      if(openSet.has(id)){ openSet.delete(id); closeCard(card); }
      else { openSet.add(id); openCard(card); }
    };
  });
  listEl.querySelectorAll('[data-share]').forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); shareItem(decodeURIComponent(b.dataset.share)); };
  });
  listEl.querySelectorAll('[data-copy]').forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); copyItem(decodeURIComponent(b.dataset.copy), b); };
  });
  listEl.querySelectorAll('[data-edit]').forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); openEntryForm(decodeURIComponent(b.dataset.edit)); };
  });
  listEl.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); deleteCustom(decodeURIComponent(b.dataset.del)); };
  });
  listEl.querySelectorAll('[data-fav]').forEach(b=>{
    b.onclick=(e)=>{
      e.stopPropagation();
      const id=decodeURIComponent(b.dataset.fav);
      const wasEmpty=(favSet.size===0);
      toggleFav(id);
      const on=isFav(id);
      b.classList.toggle('on', on);
      b.closest('.card').classList.toggle('faved', on);
      if(on){ b.classList.add('pop'); setTimeout(()=>b.classList.remove('pop'),340); }
      // show/hide the favourites chip as the set crosses empty
      if(wasEmpty!==(favSet.size===0)) buildChips();
      if(activeCat==='fav' && !on){
        // viewing favourites and this was un-hearted → refresh (drop it from view)
        if(favSet.size===0) activeCat='all';
        buildChips(); render();
      }else{
        // let the heart-pop play, then re-render so the entry moves to the top of its section
        const y=window.scrollY;
        setTimeout(()=>{ render(); window.scrollTo(0,y); }, 360);
      }
    };
  });
}
function openCard(card){
  const body=card.querySelector('.card-body');
  card.classList.add('open');
  body.style.maxHeight=body.querySelector('.card-body-inner').scrollHeight+'px';
}
function closeCard(card){
  const body=card.querySelector('.card-body');
  body.style.maxHeight=body.scrollHeight+'px';
  requestAnimationFrame(()=>{ body.style.maxHeight='0px'; card.classList.remove('open'); });
}

/* ================= CUSTOM ENTRY FORM ================= */
const EF_LANGS=[['zh','简'],['zhT','繁'],['en','EN'],['ms','BM']];
const EF_FIELDS=['name','ratio','use','func','note']; // name maps to lang key directly; others <field><LangSuffix>
let efLang='zh';           // active language tab
let efEditingCid=null;     // cid when editing, null when new
let efDraft=null;          // {cat, ico, kind, data:{ zh:{name,ratio,use,func,note}, ... }}

document.getElementById('addEntryBtn').onclick=()=>openEntryForm(null);

function blankDraft(){
  const d={ cat:'clean', ico:'', kind:'normal', data:{} };
  EF_LANGS.forEach(([k])=>{ d.data[k]={name:'',ratio:'',use:'',func:'',note:''}; });
  return d;
}
function entryToDraft(it){
  const d={ cat:it.cat, ico:it.ico||'', kind:it.kind||'normal', data:{} };
  const suf={zh:'Zh',zhT:'ZhT',en:'En',ms:'Ms'};
  EF_LANGS.forEach(([k])=>{
    d.data[k]={
      name: it[k]||'',
      ratio: it['ratio'+suf[k]]||'',
      use: it['use'+suf[k]]||'',
      func: it['func'+suf[k]]||'',
      note: it['note'+suf[k]]||''
    };
  });
  return d;
}

function openEntryForm(cid){
  efEditingCid=cid||null;
  if(cid){
    const it=CUSTOM.find(c=>c.cid===cid);
    efDraft = it? entryToDraft(it) : blankDraft();
  }else{
    efDraft=blankDraft();
    efDraft.cat = (activeCat!=='all' && CATS[activeCat]) ? activeCat : 'clean';
  }
  efLang=lang; // start on the app's current language
  document.getElementById('entryModalTitle').textContent = cid?UI.formTitleEdit[lang]:UI.formTitleNew[lang];
  document.getElementById('lblCat').textContent=UI.fCat[lang];
  document.getElementById('lblKind').textContent=UI.fKind[lang];
  document.getElementById('efHint').textContent=UI.fLangHint[lang];
  document.getElementById('efCancel').textContent=UI.fCancel[lang];
  document.getElementById('efSave').textContent=UI.fSave[lang];
  buildEfCats(); buildEfKinds(); buildEfLangTabs(); buildEfFields();
  openModal('entryModal');
}

function buildEfCats(){
  const el=document.getElementById('efCats');
  el.innerHTML=Object.entries(CATS).map(([k,c])=>
    `<button class="ef-cat ${efDraft.cat===k?'sel':''}" data-c="${k}"><span class="i">${c.ico}</span><span class="t">${c[lang]}</span></button>`).join('');
  el.querySelectorAll('.ef-cat').forEach(b=>b.onclick=()=>{ efDraft.cat=b.dataset.c; buildEfCats(); });
}
function buildEfKinds(){
  const el=document.getElementById('efKinds');
  const kinds=[['normal',UI.kindNormal[lang]],['strong',UI.kindStrong[lang]],['neat',UI.kindNeat[lang]]];
  el.innerHTML=kinds.map(([k,t])=>`<button class="ef-kind ${efDraft.kind===k?'sel':''}" data-k="${k}">${t}</button>`).join('');
  el.querySelectorAll('.ef-kind').forEach(b=>b.onclick=()=>{ efDraft.kind=b.dataset.k; buildEfKinds(); });
}
function buildEfLangTabs(){
  const el=document.getElementById('efLangTabs');
  el.innerHTML=EF_LANGS.map(([k,label])=>{
    const filled = efDraft.data[k] && (efDraft.data[k].name||efDraft.data[k].ratio);
    return `<button class="ef-langtab ${k===efLang?'sel':''} ${filled?'filled':''}" data-l="${k}">${label}${filled?'<span class="flag">✓</span>':''}</button>`;
  }).join('');
  el.querySelectorAll('.ef-langtab').forEach(b=>b.onclick=()=>{ saveEfFields(); efLang=b.dataset.l; buildEfLangTabs(); buildEfFields(); });
}
function buildEfFields(){
  const d=efDraft.data[efLang];
  document.getElementById('efFields').innerHTML=`
    <div class="ef-field"><label for="ef_name">${UI.fName[lang]}</label><input type="text" id="ef_name" value="${escAttr(d.name)}"></div>
    <div class="ef-field"><label for="ef_ratio">${UI.fRatio[lang]}</label><input type="text" id="ef_ratio" value="${escAttr(d.ratio)}"></div>
    <div class="ef-field"><label for="ef_use">${UI.fUse[lang]}</label><textarea id="ef_use">${escHtml(d.use)}</textarea></div>
    <div class="ef-field"><label for="ef_func">${UI.fFunc[lang]}</label><textarea id="ef_func">${escHtml(d.func)}</textarea></div>
    <div class="ef-field"><label for="ef_note">${UI.fNote[lang]}</label><textarea id="ef_note">${escHtml(d.note)}</textarea></div>`;
}
function saveEfFields(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  efDraft.data[efLang]={ name:g('ef_name'), ratio:g('ef_ratio'), use:g('ef_use'), func:g('ef_func'), note:g('ef_note') };
}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return escHtml(s).replace(/"/g,'&quot;');}

document.getElementById('efCancel').onclick=()=>closeModal('entryModal');
document.getElementById('efSave').onclick=()=>{
  saveEfFields();
  // require at least one language with name + ratio
  const langsFilled=EF_LANGS.map(([k])=>k).filter(k=>efDraft.data[k].name && efDraft.data[k].ratio);
  if(langsFilled.length===0){ showToast(UI.fNeedName[lang]); return; }
  // fill blank languages from the first filled one
  const primary=langsFilled[0];
  const suf={zh:'Zh',zhT:'ZhT',en:'En',ms:'Ms'};
  const entry={ cat:efDraft.cat, ico:CATS[efDraft.cat].ico, kind:efDraft.kind, kw:'' };
  EF_LANGS.forEach(([k])=>{
    const src = (efDraft.data[k].name||efDraft.data[k].ratio)? efDraft.data[k] : efDraft.data[primary];
    entry[k]=src.name;
    entry['ratio'+suf[k]]=src.ratio;
    entry['use'+suf[k]]=src.use;
    entry['func'+suf[k]]=src.func;
    entry['note'+suf[k]]=src.note;
  });
  // keyword blob for search
  entry.kw=EF_LANGS.map(([k])=>efDraft.data[k].name+' '+efDraft.data[k].ratio).join(' ').trim();

  if(efEditingCid){
    const i=CUSTOM.findIndex(c=>c.cid===efEditingCid);
    if(i>=0){ entry.cid=efEditingCid; CUSTOM[i]=entry; }
  }else{
    entry.cid='custom-'+Date.now()+'-'+Math.floor(Math.random()*1000);
    CUSTOM.push(entry);
  }
  saveCustom();
  closeModal('entryModal');
  showToast(UI.savedEntry[lang]);
  buildChips();
  render();
};
document.getElementById('entryModal').onclick=(e)=>{ if(e.target===document.getElementById('entryModal')) closeModal('entryModal'); };

/* in-app confirm dialog — native confirm() is blocked/unreliable in installed PWAs */
function askConfirm(msg, onYes){
  const modal=document.getElementById('confirmModal');
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmYes').textContent=UI.confirmYes[lang];
  document.getElementById('confirmNo').textContent=UI.confirmNo[lang];
  const yes=document.getElementById('confirmYes');

  const close=()=>{ modal.classList.remove('show'); if(!document.querySelector('.modal-bg.show')) document.body.style.overflow=''; };
  yes.onclick=()=>{ close(); onYes(); };
  no.onclick=close;
  modal.onclick=(e)=>{ if(e.target===modal) close(); };
  modal.classList.add('show'); document.body.style.overflow='hidden';
}

function deleteCustom(id){
  const it=CUSTOM.find(c=>c.cid===id); if(!it) return;
  askConfirm(UI.delConfirm[lang], ()=>{
    CUSTOM=CUSTOM.filter(c=>c.cid!==id);
    saveCustom();
    openSet.delete(id);
    // if we were viewing the custom filter and none remain, drop back to All
    if(activeCat==='custom' && CUSTOM.length===0) activeCat='all';
    buildChips();
    render();
    showToast(UI.deletedToast[lang]);
  });
}

/* ============== SHARE / IMPORT CUSTOM TRICKS ============== */
/* Portable code format: "ENZ1:" + base64(JSON of custom entries).
   Unicode-safe base64 so Chinese text survives. */
const TRICKS_PREFIX='ENZ1:';
function b64EncodeUnicode(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function b64DecodeUnicode(str){
  return decodeURIComponent(escape(atob(str)));
}
function exportTricksCode(){
  // strip nothing sensitive; keep every field. cid is regenerated on import to avoid clashes.
  const payload = CUSTOM.map(c=>{ const {cid, ...rest}=c; return rest; });
  return TRICKS_PREFIX + b64EncodeUnicode(JSON.stringify(payload));
}
function parseTricksCode(raw){
  let s=String(raw||'').trim();
  if(!s) throw new Error('empty');
  // tolerate surrounding text / whitespace: grab the ENZ1:... token
  const m=s.match(/ENZ1:[A-Za-z0-9+/=]+/);
  if(m) s=m[0];
  if(!s.startsWith(TRICKS_PREFIX)) throw new Error('format');
  const json=b64DecodeUnicode(s.slice(TRICKS_PREFIX.length));
  const arr=JSON.parse(json);
  if(!Array.isArray(arr)) throw new Error('format');
  return arr;
}
function importTricks(raw){
  const arr=parseTricksCode(raw);
  // validate + merge; skip exact duplicates (same zh name + same ratios)
  const sig=c=>[c.zh,c.zhT,c.en,c.ms,c.ratioZh,c.ratioEn].join('¦');
  const existing=new Set(CUSTOM.map(sig));
  const VALID_CATS=Object.keys(CATS);
  let added=0, skipped=0;
  arr.forEach(raw=>{
    if(!raw || typeof raw!=='object'){ skipped++; return; }
    // must have at least one name and one ratio across languages
    const hasName = raw.zh||raw.zhT||raw.en||raw.ms;
    const hasRatio = raw.ratioZh||raw.ratioZhT||raw.ratioEn||raw.ratioMs;
    if(!hasName || !hasRatio){ skipped++; return; }
    const cat = VALID_CATS.includes(raw.cat)? raw.cat : VALID_CATS[0];
    const kind = ['normal','strong','neat'].includes(raw.kind)? raw.kind : 'normal';
    const entry={
      cid:'custom-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),
      cat, ico: CATS[cat].ico, kind,
      zh:raw.zh||'', zhT:raw.zhT||'', en:raw.en||'', ms:raw.ms||'',
      ratioZh:raw.ratioZh||'', ratioZhT:raw.ratioZhT||'', ratioEn:raw.ratioEn||'', ratioMs:raw.ratioMs||'',
      useZh:raw.useZh||'', useZhT:raw.useZhT||'', useEn:raw.useEn||'', useMs:raw.useMs||'',
      funcZh:raw.funcZh||'', funcZhT:raw.funcZhT||'', funcEn:raw.funcEn||'', funcMs:raw.funcMs||'',
      noteZh:raw.noteZh||'', noteZhT:raw.noteZhT||'', noteEn:raw.noteEn||'', noteMs:raw.noteMs||'',
      kw:raw.kw||''
    };
    if(existing.has(sig(entry))){ skipped++; return; }
    existing.add(sig(entry));
    CUSTOM.push(entry); added++;
  });
  if(added>0){ saveCustom(); buildChips(); render(); }
  return {added, skipped};
}

/* ---- export modal ---- */
function updateTricksRow(){
  // Export only makes sense with custom entries; import is always available.
  const exp=document.getElementById('exportTricksBtn');
  if(exp) exp.style.display = CUSTOM.length>0 ? '' : 'none';
}
function openExportModal(){
  if(CUSTOM.length===0){ showToast(UI.noTricks[lang]); return; }
  document.getElementById('exportModalTitle').textContent=UI.exportTitle[lang];
  document.getElementById('exportIntro').textContent=UI.count[lang](CUSTOM.length)+' · '+UI.exportIntro[lang];
  document.getElementById('exportCode').value=exportTricksCode();
  document.getElementById('exportCopyBtn').textContent=UI.exportCopy[lang];
  document.getElementById('exportShareBtn').textContent=UI.exportShare[lang];
  document.getElementById('exportFileBtn').textContent=UI.exportFile[lang];
  openModal('exportModal');
}
async function exportCopy(){
  const code=document.getElementById('exportCode').value;
  try{ await navigator.clipboard.writeText(code); showToast(UI.copiedToast[lang]); }
  catch(e){
    const ta=document.getElementById('exportCode'); ta.focus(); ta.select();
    try{ document.execCommand('copy'); showToast(UI.copiedToast[lang]); }catch(_){}
  }
}
async function exportShare(){
  const code=document.getElementById('exportCode').value;
  const msg=UI.shareMsg[lang]+'\n\n'+code;
  if(navigator.share){
    try{ await navigator.share({text:msg}); return; }catch(e){ if(e && e.name==='AbortError') return; }
  }
  // fallback: open WhatsApp with the code
  window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(msg),'_blank');
}
function exportFile(){
  const code=document.getElementById('exportCode').value;
  const blob=new Blob([code],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='enzyme-tricks.txt';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast(UI.fileSaved[lang]);
}

/* ---- import modal ---- */
function openImportModal(){
  document.getElementById('importModalTitle').textContent=UI.importTitle[lang];
  document.getElementById('importIntro').textContent=UI.importIntro[lang];
  document.getElementById('importCode').value='';
  document.getElementById('importCode').placeholder=UI.importPlaceholder[lang];
  document.getElementById('importDoBtn').textContent=UI.importDo[lang];
  document.getElementById('importFileBtn').textContent=UI.importFile[lang];
  const res=document.getElementById('importResult'); res.textContent=''; res.className='import-result';
  openModal('importModal');
}
function doImport(raw){
  const res=document.getElementById('importResult');
  try{
    const {added,skipped}=importTricks(raw);
    if(added===0 && skipped>0){
      res.className='import-result err';
      res.textContent=UI.importNoneNew[lang];
    }else{
      res.className='import-result ok';
      res.textContent=UI.importDone[lang](added,skipped);
      showToast(UI.importDone[lang](added,skipped));
    }
  }catch(e){
    res.className='import-result err';
    res.textContent=UI.importBad[lang];
  }
}

document.getElementById('importTricksBtn').onclick=openImportModal;
document.getElementById('exportCopyBtn').onclick=exportCopy;

/* Reliable external open — works in iOS Safari when triggered by user gesture */
function openExternal(url){
  // Direct navigation is the most reliable across iOS in-app browsers.
  const a=document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function copyItem(id, btn){
  const it=findItem(id); if(!it) return;
  doCopy(shareText(it),()=>{
    btn.classList.add('copied');
    const span=btn.querySelector('span'); const old=span.textContent;
    span.textContent=UI.copied[lang];
    showToast(UI.copiedToast[lang]);
    setTimeout(()=>{ btn.classList.remove('copied'); span.textContent=old; },1600);
  });
}
function doCopy(txt,done){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));
  } else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement('textarea');ta.value=txt;
  ta.style.position='fixed';ta.style.top='0';ta.style.left='0';ta.style.opacity='0';
  ta.contentEditable='true';ta.readOnly=false;
  document.body.appendChild(ta);
  // iOS-specific selection
  const range=document.createRange();range.selectNodeContents(ta);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  ta.setSelectionRange(0,txt.length);
  try{document.execCommand('copy');done();}catch(e){}
  document.body.removeChild(ta);
}
let toastT;
function showToast(msg){
  toastEl.textContent=msg;toastEl.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),1900);
}
